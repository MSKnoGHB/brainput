{% extends 'notebook/base.html' %}
{% block content %}
  <h3>Home</h3> 
  <div class="container">
    <div class="row">
      <div class="'col-12">

        <div class="row">
          <div class="'col-12 col-md-4">
            list
          </div>

          <div class="'col-12 col-md-8">
            <h4>NOTE新規作成</h4>
            <div class="card p-3 mb-3">
              <form method="POST" action="/create/">
                {% csrf_token %}
                <div class="d-flex gap-3 mb-3">
                  <select name="category" class="form-select w-50">
                    {% for category in categories %}
                      <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                  </select>
                  <select name="sub_category" class="form-select w-50">
                    {% for sub_category in sub_categories %}
                      <option value="{{ sub_category.id }}">{{ sub_category.name }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="d-flex mb-3">
                  <input type="text" name="title" placeholder="タイトルを入力" class="form-control">
                </div>
                <div class="d-flex mb-3">
                  <textarea name="command" placeholder="コマンドを入力" class="form-control"></textarea>
                </div>
                <div class="d-flex mb-3">
                  <textarea name="description" placeholder="コマンドの説明を入力" class="form-control"></textarea>
                </div>
                <div class="d-flex justify-content-end">
                  <button type="submit" class="btn btn-sm btn-success mb-3">作成</button>
                </div>
              </form>
            </div>
            <h4>NOTE作成履歴</h4>
            <div class="card p-3 mb-3">
              <table>
                {% for note in notes %}
                  <thead>
                    <tr>
                      <th>サブカテゴリ</th>
                      <th>タイトル</th>
                      <th>日付</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>{{ note.category }}</td>
                      <td>{{ note.title }}</td>
                      <td>{{ note.created_at|date:"Y/m/d" }}</td>
                      <td><a href="{% url 'show' id=note.id %}" class="btn btn-sm btn-primary">詳細 </a></td>
                    </tr>
                  </tbody>
                {% endfor %}
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
